<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Hello, World</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a1929;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  #map { width: 100vw; height: 100vh; background: #ffffff; }

  .leaflet-container { background: #0a1929 !important; font-family: inherit; outline: none; }

  /* Smoother, longer zoom animation with strong ease-out */
  .leaflet-zoom-anim .leaflet-zoom-animated {
    -webkit-transition: -webkit-transform 0.35s cubic-bezier(0.16, 1, 0.3, 1) !important;
            transition:         transform 0.35s cubic-bezier(0.16, 1, 0.3, 1) !important;
  }
  .leaflet-fade-anim .leaflet-tile {
    will-change: opacity;
    -webkit-transition: opacity 0.25s linear;
            transition: opacity 0.25s linear;
  }

  .leaflet-container.leaflet-grab,
  .leaflet-grab {
    cursor: grab;
    cursor: -webkit-grab;
  }
  .leaflet-container.leaflet-dragging,
  .leaflet-container.leaflet-dragging .leaflet-grab,
  .leaflet-dragging .leaflet-grab {
    cursor: grabbing;
    cursor: -webkit-grabbing;
  }
  /* Dots get a pointer to signal they're clickable */
  .leaflet-marker-icon { cursor: pointer; }
  .leaflet-control-attribution {
    background: rgba(255,255,255,0.6) !important;
    font-size: 9px;
    color: #aaa;
  }
  .leaflet-control-attribution a { color: #888; }
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
  }
  .leaflet-top.leaflet-right .leaflet-control-zoom {
    margin-top: 48px;
    margin-right: 14px;
  }
  .leaflet-control-zoom a {
    background: rgba(13, 24, 38, 0.85) !important;
    color: #999 !important;
    border: 1px solid #2f4153 !important;
    font-weight: 200 !important;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(20, 35, 55, 0.95) !important;
    color: #d8d8d8 !important;
    border-color: #3d5168 !important;
  }
  .leaflet-control-zoom-in {
    border-radius: 4px 4px 0 0 !important;
    border-bottom: none !important;
  }
  .leaflet-control-zoom-out {
    border-radius: 0 0 4px 4px !important;
    border-top: 1px solid #1f2d3f !important;
  }
  .leaflet-control-zoom a.leaflet-disabled {
    opacity: 0.4;
  }

  /* Dots */
  .dot-wrap { background: transparent !important; border: none !important; }
  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    background: var(--c, #1a1a1a);
    box-shadow: 0 0 8px var(--c-soft, rgba(0,0,0,0.2));
  }
  .dot::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1.5px solid var(--c-soft, rgba(0,0,0,0.3));
    animation: pulse 3s ease-out infinite;
    pointer-events: none;
  }
  .dot:hover { transform: scale(1.45); }
  .dot.expanded { transform: scale(1.7); }
  .dot.mine {
    box-shadow:
      0 0 0 2.5px #ffffff,
      0 0 0 3.5px rgba(0,0,0,0.18),
      0 0 10px var(--c-soft, rgba(0,0,0,0.25));
  }
  .dot.preview { opacity: 0.55; }
  .dot.preview::after { animation: none; border-color: transparent; }

  @keyframes pulse {
    0%   { transform: scale(0.55); opacity: 0.55; }
    80%  { opacity: 0; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: rgba(255, 255, 255, 0.07);
    -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    padding: 2px 4px;
  }
  .leaflet-popup-tip {
    background: rgba(255, 255, 255, 0.07);
    -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: none;
  }
  .leaflet-popup-content {
    margin: 13px 16px 12px;
    font-size: 14px;
    line-height: 1.5;
    width: 220px !important;
  }
  .msg-text {
    color: rgba(255, 255, 255, 0.9);
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .msg-text.clampable { cursor: pointer; }
  .msg-text.expanded {
    -webkit-line-clamp: unset;
    display: block;
    overflow: visible;
  }
  .msg-meta {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-wrap: nowrap;
    overflow: hidden;
    min-width: 0;
  }
  .msg-mood { display: inline-flex; align-items: center; gap: 5px; color: rgba(255, 255, 255, 0.4); }
  .msg-mood::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c);
  }
  .msg-loc {
    color: rgba(255, 255, 255, 0.4);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .msg-divider { color: rgba(255, 255, 255, 0.25); }

  /* Compose */
  #compose {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  #compose.open { display: flex; }
  .compose-card {
    background: #fff;
    border: 1px solid #eaeaea;
    border-radius: 6px;
    padding: 20px 22px 16px;
    width: min(440px, 92vw);
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }
  .compose-loc {
    font-size: 10px;
    color: #999;
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .compose-card textarea {
    width: 100%;
    min-height: 84px;
    border: none;
    outline: none;
    resize: none;
    font: inherit;
    font-size: 15px;
    line-height: 1.5;
    color: #1a1a1a;
    padding: 0;
    background: transparent;
  }

  .mood-picker {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px 6px;
  }
  .mood {
    background: none;
    border: 1px solid transparent;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color 0.15s, background 0.15s;
    font: inherit;
    color: #666;
  }
  .mood:hover { background: #fafafa; }
  .mood.selected { border-color: #1a1a1a; background: #fafafa; color: #1a1a1a; }
  .mood-swatch {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--c);
    box-shadow: 0 0 0 2px rgba(255,255,255,1), 0 0 5px var(--c);
  }
  .mood-name {
    font-size: 10.5px;
    letter-spacing: 0.04em;
  }

  .photo-row {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #f3f3f3;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 28px;
  }
  .photo-btn {
    background: none;
    border: 1px dashed #d8d8d8;
    color: #888;
    padding: 6px 12px;
    font: inherit;
    font-size: 11.5px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  .photo-btn:hover { border-color: #999; color: #333; }
  .photo-preview {
    position: relative;
    display: inline-block;
  }
  .photo-preview img {
    display: block;
    max-width: 92px;
    max-height: 92px;
    border-radius: 3px;
    border: 1px solid #ececec;
  }
  .photo-remove {
    position: absolute;
    top: -7px; right: -7px;
    width: 18px; height: 18px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .msg-photo {
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
  }
  .msg-photo img { display: block; width: 100%; height: auto; }

  .compose-error {
    margin-top: 10px;
    font-size: 11.5px;
    color: #c66;
    line-height: 1.4;
    letter-spacing: 0.02em;
  }

  .compose-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid #f3f3f3;
  }
  .counter { font-size: 11px; color: #aaa; font-variant-numeric: tabular-nums; }
  .counter.over { color: #c53; }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    background: #fff;
    border: 1px solid #ddd;
    padding: 6px 14px;
    font: inherit;
    font-size: 12.5px;
    border-radius: 4px;
    cursor: pointer;
    color: #555;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .btn:hover { background: #fafafa; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #000; }
  .btn.primary:disabled { background: #d4d4d4; border-color: #d4d4d4; color: #fff; cursor: not-allowed; }

  #hint {
    position: fixed;
    bottom: 116px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #999;
    background: rgba(255,255,255,0.9);
    padding: 5px 14px;
    border-radius: 100px;
    z-index: 500;
    pointer-events: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 1s ease;
    white-space: nowrap;
  }
  #hint.gone { opacity: 0; }

  #title {
    position: fixed;
    top: 14px; left: 18px;
    font-size: 12px;
    color: #999;
    z-index: 500;
    pointer-events: none;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  #resetTimer {
    position: fixed;
    bottom: 82px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #999;
    z-index: 500;
    pointer-events: none;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #langBtn {
    position: fixed;
    top: 12px; right: 14px;
    z-index: 501;
    background: transparent;
    border: none;
    padding: 4px;
    cursor: pointer;
    color: #999;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: color 0.15s;
  }
  #langBtn:hover { color: #ccc; }
  #langBtn svg { width: 18px; height: 18px; display: block; }

  #langPanel {
    position: fixed;
    top: 42px; right: 14px;
    z-index: 502;
    background: rgba(13, 24, 38, 0.96);
    border: 1px solid #2f4153;
    border-radius: 6px;
    padding: 6px 0;
    min-width: 150px;
    max-height: 60vh;
    overflow-y: auto;
    display: none;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
  }
  #langPanel.open { display: block; }
  .lang-opt {
    display: block;
    width: 100%;
    padding: 7px 16px;
    background: transparent;
    border: none;
    color: #888;
    font: inherit;
    font-size: 11.5px;
    text-align: left;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.12s, color 0.12s;
  }
  .lang-opt:hover { background: rgba(255, 255, 255, 0.04); color: #d8d8d8; }
  .lang-opt.active { color: #fff; background: rgba(255, 255, 255, 0.05); }

  .msg-translation {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed rgba(255, 255, 255, 0.1);
  }
  .msg-translation-label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .msg-translation-text {
    font-size: 13.5px;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  #dropBtn {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%);
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid #e8e8e8;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 24px;
    font-weight: 200;
    line-height: 1;
    cursor: pointer;
    z-index: 600;
    box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0 3px 0;
  }
  #dropBtn:hover {
    transform: translateX(-50%) scale(1.07);
    box-shadow: 0 3px 18px rgba(0,0,0,0.1);
  }
  #dropBtn:active { transform: translateX(-50%) scale(0.96); }
  #dropBtn:disabled { opacity: 0.45; cursor: not-allowed; }

  #geoMsg {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1100;
  }
  #geoMsg.open { display: flex; }
  .geo-card {
    background: #fff;
    border: 1px solid #ececec;
    border-radius: 6px;
    padding: 22px 24px 18px;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }
  .geo-text {
    font-size: 13px;
    color: #555;
    line-height: 1.55;
    margin-bottom: 16px;
  }

  #zoomLabel {
    position: fixed;
    bottom: 14px; right: 14px;
    z-index: 500;
    font-size: 9.5px;
    color: #aaa;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.85);
    padding: 4px 10px;
    border-radius: 100px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="title">Hello, World</div>

<button id="langBtn" type="button" aria-label="translation language" aria-haspopup="true" aria-expanded="false">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="9"/>
    <path d="M3 12h18"/>
    <path d="M12 3a14 14 0 0 1 0 18"/>
    <path d="M12 3a14 14 0 0 0 0 18"/>
  </svg>
</button>
<div id="langPanel" role="menu" aria-labelledby="langBtn"></div>

<div id="map"></div>
<div id="hint" class="gone"></div>

<div id="resetTimer" aria-live="off"></div>

<button id="dropBtn" type="button" aria-label="leave a message">+</button>


<div id="geoMsg" role="dialog" aria-modal="true">
  <div class="geo-card">
    <div class="geo-text">Hello, World needs your real location to participate. You can still browse and read messages without sharing yours.</div>
    <button class="btn" id="geoDismiss" type="button">ok</button>
  </div>
</div>

<div id="compose" role="dialog" aria-modal="true">
  <div class="compose-card">
    <div class="compose-loc" id="composeLoc">somewhere</div>
    <textarea id="composeText" maxlength="280" placeholder="say something to the world..."></textarea>
    <div class="mood-picker" id="moodPicker"></div>
    <div class="photo-row">
      <button id="photoBtn" type="button" class="photo-btn" hidden>+ photo</button>
      <div id="photoPreview" class="photo-preview" hidden>
        <img id="photoPreviewImg" alt="" />
        <button id="photoRemove" type="button" class="photo-remove" aria-label="remove photo">&times;</button>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" hidden />
    <div id="composeError" class="compose-error" hidden></div>
    <div class="compose-actions">
      <div class="counter" id="counter">280</div>
      <div class="btn-row">
        <button class="btn" id="cancelBtn" type="button">cancel</button>
        <button class="btn primary" id="sendBtn" type="button" disabled>send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ───────────── COLOR UTILS ─────────────
function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return [
    parseInt(h.slice(0, 2), 16),
    parseInt(h.slice(2, 4), 16),
    parseInt(h.slice(4, 6), 16)
  ];
}
function rgbToHex(r, g, b) {
  const c = n => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, "0");
  return "#" + c(r) + c(g) + c(b);
}
function rgba(hex, a) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function averageColors(hexes) {
  if (!hexes.length) return null;
  let r = 0, g = 0, b = 0;
  for (const h of hexes) {
    const [hr, hg, hb] = hexToRgb(h);
    r += hr; g += hg; b += hb;
  }
  const n = hexes.length;
  return rgbToHex(r / n, g / n, b / n);
}

// ───────────── NEAREST CITY ─────────────
function nearestCity(lat, lng) {
  let best = null, bestD = Infinity;
  const w = ((lng + 540) % 360) - 180;
  const cosLat = Math.cos((lat * Math.PI) / 180);
  for (const c of CITIES) {
    const dLat = c.lat - lat;
    let dLng = c.lng - w;
    if (dLng > 180) dLng -= 360;
    if (dLng < -180) dLng += 360;
    const dx = dLng * cosLat;
    const d = dLat * dLat + dx * dx;
    if (d < bestD) { bestD = d; best = c; }
  }
  return best ? best.name : `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// Compute the zoom at which the full latitude range fills the viewport vertically.
// Web Mercator world height (in px) at zoom z = 256 * 2^z. Pin minZoom so the world
// can never be smaller than the viewport, eliminating top/bottom whitespace.
function applyVerticalFit(initial) {
  const h = map.getSize().y;
  if (!h) return;
  const fitZoom = Math.log2(h / 256);
  const minZ = Math.max(1, fitZoom);
  map.setMinZoom(minZ);
  if (initial) {
    map.setView([0, 0], minZ, { animate: false });
  } else if (map.getZoom() < minZ) {
    map.setView([0, map.getCenter().lng], minZ, { animate: false });
  }
}

// Inverted wheel zoom — swipe up always zooms in
map.scrollWheelZoom.disable();
(function setupInvertedWheel() {
  let accum = 0;
  let target = null;
  let frame = null;
  map.getContainer().addEventListener("wheel", function (e) {
    e.preventDefault();
    // Trackpad pinch fires wheel with ctrlKey=true — keep that natural (pinch out = zoom in)
    const sign = e.ctrlKey ? -1 : 1;
    accum += sign * e.deltaY;
    target = map.mouseEventToContainerPoint(e);
    if (frame) return;
    frame = requestAnimationFrame(() => {
      const change = accum / 100;
      const next = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), map.getZoom() + change));
      map.setZoomAround(target, next, { animate: true, duration: 0.3, easeLinearity: 0.05 });
      accum = 0;
      frame = null;
    });
  }, { passive: false });
})();

const COUNTRIES_URL = "https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson";

let countriesGeoJSON = null;
let countriesLayer = null;
let countryAvg = new Map();   // country name -> hex
let continentAvg = new Map(); // continent name -> hex

async function loadCountries() {
  try {
    const r = await fetch(COUNTRIES_URL, { cache: "force-cache" });
    if (!r.ok) throw new Error("fetch failed");
    countriesGeoJSON = await r.json();
    // precompute bbox per feature
    for (const f of countriesGeoJSON.features) {
      if (!f.bbox) f.bbox = computeBBox(f);
    }
  } catch (e) {
    console.warn("Countries GeoJSON unavailable; falling back to dots-only mode.", e);
    countriesGeoJSON = null;
  }
}

function computeBBox(feature) {
  let minX = 180, minY = 90, maxX = -180, maxY = -90;
  const visit = (coords) => {
    if (typeof coords[0] === "number") {
      const [x, y] = coords;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    } else {
      for (const c of coords) visit(c);
    }
  };
  visit(feature.geometry.coordinates);
  return [minX, minY, maxX, maxY];
}

// ───────────── POINT-IN-POLYGON ─────────────
function pointInRing(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > y) !== (yj > y)) &&
      (x < ((xj - xi) * (y - yi)) / (yj - yi || 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
function pointInPoly(x, y, polygon) {
  // polygon: [outer, ...holes]
  if (!pointInRing(x, y, polygon[0])) return false;
  for (let i = 1; i < polygon.length; i++) {
    if (pointInRing(x, y, polygon[i])) return false; // in a hole
  }
  return true;
}
function pointInFeature(x, y, feature) {
  const g = feature.geometry;
  if (g.type === "Polygon") return pointInPoly(x, y, g.coordinates);
  if (g.type === "MultiPolygon") {
    for (const poly of g.coordinates) {
      if (pointInPoly(x, y, poly)) return true;
    }
  }
  return false;
}
function findCountry(lat, lng) {
  if (!countriesGeoJSON) return null;
  const x = lng, y = lat;
  for (const f of countriesGeoJSON.features) {
    const b = f.bbox;
    if (x < b[0] || x > b[2] || y < b[1] || y > b[3]) continue;
    if (pointInFeature(x, y, f)) return f;
  }
  return null;
}

  for (const m of messages) {
    if (m._country !== undefined) continue;
    const f = findCountry(m.lat, m.lng);
    if (f) {
      m._country = f.properties.NAME || f.properties.ADMIN || null;
      m._continent = f.properties.CONTINENT || null;
    } else {
      m._country = null;
      m._continent = null;
    }
  }
}

function recomputeAggregates() {
  const byCountry = new Map();
  const byContinent = new Map();
  for (const m of messages) {
    const color = MOOD_BY_ID[m.mood]?.color;
    if (!color) continue;
    if (m._country) {
      if (!byCountry.has(m._country)) byCountry.set(m._country, []);
      byCountry.get(m._country).push(color);
    }
    if (m._continent) {
      if (!byContinent.has(m._continent)) byContinent.set(m._continent, []);
      byContinent.get(m._continent).push(color);
    }
  }
  countryAvg = new Map();
  for (const [k, v] of byCountry) countryAvg.set(k, averageColors(v));
  continentAvg = new Map();
  for (const [k, v] of byContinent) continentAvg.set(k, averageColors(v));
}

function dotIconHtml(mood, mine) {

  return `<div class="dot${mine ? " mine" : ""}" style="--c:${color}; --c-soft:${soft};"></div>`;

function addDotMarker(msg) {
  const icon = L.divIcon({
    className: "dot-wrap",
    html: dotIconHtml(msg.mood, msg.mine),
    iconSize: [11, 11],
    iconAnchor: [5.5, 5.5]
  });
  const m = L.marker([msg.lat, msg.lng], { icon, riseOnHover: true, keyboard: false });
  m.bindPopup(() => buildPopup(msg), {
    closeButton: false,
    minWidth: 220,
    maxWidth: 220,
    autoPan: true,
    autoPanPadding: [30, 30]
  });

  m.on("popupopen", () => {
    const el = m.getElement();
    if (el) { const d = el.querySelector(".dot"); if (d) d.classList.add("expanded"); }
    const popupEl = m.getPopup() && m.getPopup().getElement();
    const textEl = popupEl && popupEl.querySelector(".msg-text");
    if (textEl && !textEl.dataset.bound) {
      textEl.dataset.bound = "1";
      if (textEl.scrollHeight > textEl.clientHeight + 1) {
        textEl.classList.add("clampable");
      }
      textEl.addEventListener("click", () => {
        if (!textEl.classList.contains("clampable") && !textEl.classList.contains("expanded")) return;
        textEl.classList.toggle("expanded");
        const p = m.getPopup();
        if (p && p.update) p.update();
      });
    }
  });
  m.on("popupclose", () => {
    const el = m.getElement();
    if (el) { const d = el.querySelector(".dot"); if (d) d.classList.remove("expanded"); }
  });

  dotLayer.addLayer(m);
  dotMarkers.set(msg.id, m);
}

function buildPopup(msg) {
  const wrap = document.createElement("div");
  const mood = MOOD_BY_ID[msg.mood];
  const photoHtml = msg.photo
    ? `<div class="msg-photo"><img src="${msg.photo}" alt=""></div>`
    : "";
  wrap.innerHTML =
    `<div class="msg-text">${escapeHtml(msg.text)}</div>` +
    `<div class="msg-translation" hidden></div>` +
    photoHtml +
    `<div class="msg-meta">` +
      `<span class="msg-mood" style="--c:${mood?.color || "#999"}">${escapeHtml(mood?.name || msg.mood)}</span>` +
      `<span class="msg-divider">·</span>` +
      `<span class="msg-loc">${escapeHtml(msg.loc || "")}</span>` +
    `</div>`;

  const target = getCurrentLang();
  if (target && target !== "off" && msg.text) {
    const tEl = wrap.querySelector(".msg-translation");
    translate(msg.text, target).then((t) => {
      if (!t) return;
      if (normalizeForCompare(t) === normalizeForCompare(msg.text)) return;
      tEl.innerHTML =
        `<div class="msg-translation-label">translated</div>` +
        `<div class="msg-translation-text">${escapeHtml(t)}</div>`;
      tEl.hidden = false;
      const m = dotMarkers.get(msg.id);
      const p = m && m.getPopup && m.getPopup();
      if (p && p.update) p.update();
    });
  }

  return wrap;
}

function rebuildDots() {
  dotLayer.clearLayers();
  dotMarkers.clear();
  for (const m of messages) addDotMarker(m);
}

const URL_RE = /(?:https?:\/\/|www\.)\S+|\b[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.(?:com|org|net|io|app|co|gov|edu|me|us|uk|ca|de|fr|jp|cn|au|ru|br|in|info|biz|tv|to|ly|gl|sh|xyz|dev|ai)\b/i;
const composeError = document.getElementById("composeError");

function showComposeError(text) {
  composeError.textContent = text;
  composeError.hidden = false;
}
function clearComposeError() {
  composeError.textContent = "";
  composeError.hidden = true;
}

function submit() {
  const text = composeText.value.trim();
  if (!text || text.length > 280 || !pendingLatLng || !selectedMood) return;
  if (URL_RE.test(text)) {
    showComposeError("links aren't allowed here. plain text and feelings only.");
    return;
  }
  if (hasDroppedToday()) { closeCompose(false); return; }

  const ll = pendingLatLng;
  const f = findCountry(ll.lat, ll.lng);
  const msg = {
    id: makeId(),
    text,
    lat: ll.lat,
    lng: ll.lng,
    loc: nearestCity(ll.lat, ll.lng),
    mood: selectedMood,
    mine: true,
    photo: pendingPhoto || null,
    _country: f ? (f.properties.NAME || f.properties.ADMIN || null) : null,
    _continent: f ? (f.properties.CONTINENT || null) : null
  };

  // Persist user-only messages
  const userMsgs = loadUserMessages();
  userMsgs.push({
    id: msg.id, text: msg.text, lat: msg.lat, lng: msg.lng,
    loc: msg.loc, mood: msg.mood, mine: true, photo: msg.photo
  });
  saveUserMessages(userMsgs);

  messages.push(msg);
  recomputeAggregates();

  clearPreview();
  addDotMarker(msg);
  updateLayers();

  closeCompose(true);
  const m = dotMarkers.get(msg.id);
  if (m && map.hasLayer(dotLayer)) m.openPopup();
  hideHint();
}

const translationCache = new Map();
async function translate(text, targetLang) {
  const key = `${targetLang}::${text}`;
  if (translationCache.has(key)) return translationCache.get(key);
  try {
    const url = "https://lingva.ml/api/v1/auto/"
      + encodeURIComponent(targetLang) + "/"
      + encodeURIComponent(text);
    const r = await fetch(url);
    if (!r.ok) throw new Error("translate fetch failed");
    const data = await r.json();
    const t = data && data.translation;
    const result = (typeof t === "string" && t.trim()) ? t : null;
    translationCache.set(key, result);
    return result;
  } catch (e) {
    translationCache.set(key, null);
    return null;
  }
}

function normalizeForCompare(s) {
  return (s || "").toLowerCase().replace(/\s+/g, " ").trim();
}

// ───────────── PHOTO ─────────────
const photoBtn = document.getElementById("photoBtn");
const photoInput = document.getElementById("photoInput");
const photoPreview = document.getElementById("photoPreview");
const photoPreviewImg = document.getElementById("photoPreviewImg");
const photoRemove = document.getElementById("photoRemove");

const isCoarsePointer = matchMedia("(pointer: coarse)").matches;
let pendingPhoto = null;

function resetPhotoState() {
  pendingPhoto = null;
  photoPreview.hidden = true;
  photoPreviewImg.removeAttribute("src");
  photoBtn.hidden = !isCoarsePointer;
}

function processPhoto(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1024;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX / w, MAX / h);
        w = Math.round(w * r);
        h = Math.round(h * r);
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.78));
    };
    img.onerror = (err) => { URL.revokeObjectURL(url); reject(err); };
    img.src = url;
  });
}

photoBtn.addEventListener("click", () => photoInput.click());

photoInput.addEventListener("change", async () => {
  const file = photoInput.files && photoInput.files[0];
  photoInput.value = "";
  if (!file) return;
  try {
    pendingPhoto = await processPhoto(file);
    photoPreviewImg.src = pendingPhoto;
    photoPreview.hidden = false;
    photoBtn.hidden = true;
  } catch (e) {
    console.warn("photo processing failed", e);
  }
});

photoRemove.addEventListener("click", () => {
  pendingPhoto = null;
  photoPreview.hidden = true;
  photoPreviewImg.removeAttribute("src");
  if (isCoarsePointer) photoBtn.hidden = false;
});

// ───────────── DROP BUTTON + GEOLOCATION ─────────────
const dropBtn = document.getElementById("dropBtn");
const geoMsg = document.getElementById("geoMsg");
const geoDismiss = document.getElementById("geoDismiss");

function showGeoDenied() {
  geoMsg.classList.add("open");
}
geoDismiss.addEventListener("click", () => geoMsg.classList.remove("open"));
geoMsg.addEventListener("click", (e) => {
  if (e.target === geoMsg) geoMsg.classList.remove("open");
});

function requestDrop() {
  if (hasDroppedToday()) {
    flashHint("you've already dropped one today — come back tomorrow");
    return;
  }
  if (!navigator.geolocation) {
    showGeoDenied();
    return;
  }
  dropBtn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      dropBtn.disabled = false;
      const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
      const targetZoom = Math.max(map.getZoom(), 6);
      map.setView(ll, targetZoom, { animate: true });
      openCompose(ll);
      hideHint();
    },
    () => {
      dropBtn.disabled = false;
      showGeoDenied();
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
}
dropBtn.addEventListener("click", requestDrop);

composeText.addEventListener("input", updateCounter);
sendBtn.addEventListener("click", submit);
cancelBtn.addEventListener("click", () => closeCompose(false));

compose.addEventListener("click", (e) => {
  if (e.target === compose) closeCompose(false);
});

document.addEventListener("keydown", (e) => {
  if (!compose.classList.contains("open")) return;
  if (e.key === "Escape") closeCompose(false);
  else if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submit();
});

// ───────────── HINT ─────────────
let hintTimer = null;
function flashHint(text) {
  hint.textContent = text;
  hint.classList.remove("gone");
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hint.classList.add("gone"), 4000);
}
function hideHint() {
  if (hint && !hint.classList.contains("gone")) hint.classList.add("gone");
}
if (hasDroppedToday()) {
  hint.textContent = "you've left your mark today. come back tomorrow.";
  hint.classList.remove("gone");
  setTimeout(() => hint.classList.add("gone"), 6000);
}

// ───────────── MIDNIGHT RESET ─────────────
(function scheduleMidnight() {
  const now = new Date();
  const next = new Date(now);
  next.setHours(24, 0, 0, 0);
  const wait = next - now + 500;
  setTimeout(() => location.reload(), wait);
})();

// ───────────── RESET COUNTDOWN ─────────────
(function startResetTimer() {
  const el = document.getElementById("resetTimer");
  if (!el) return;
  function update() {
    const now = new Date();
    const next = new Date(Date.UTC(
      now.getUTCFullYear(),
      now.getUTCMonth(),
      now.getUTCDate() + 1,
      0, 0, 0, 0
    ));
    const diff = Math.max(0, next - now);
    const hours = Math.floor(diff / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    let text;
    if (hours > 0 && minutes > 0) text = `resets in ${hours}h ${minutes}m`;
    else if (hours > 0) text = `resets in ${hours}h`;
    else if (minutes > 0) text = `resets in ${minutes}m`;
    else text = "resetting soon";
    el.textContent = text;
  }
  update();
  setInterval(update, 60000);
})();

// ───────────── DEV RESET (console only) ─────────────
window.resetMyDot = function () {
  localStorage.removeItem(USER_KEY);
  for (const m of messages) {
    if (!m.mine) continue;
    const marker = dotMarkers.get(m.id);
    if (marker) {
      dotLayer.removeLayer(marker);
      dotMarkers.delete(m.id);
    }
  }
  messages = messages.filter(m => !m.mine);
  recomputeAggregates();
  clearPreview();
  hint.classList.add("gone");
  dropBtn.disabled = false;
  console.log("%c[dev] resetMyDot: localStorage cleared, ready for a new drop", "color:#888");
  return "ok";
};

// ───────────── BOOT ─────────────
(async function boot() {
  buildMessages();
  rebuildDots();
  if (!map.hasLayer(dotLayer)) dotLayer.addTo(map);
  await loadCountries();
  buildCountriesLayer();
})();
