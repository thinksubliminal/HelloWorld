<script>
"use strict";

// ───────────── SUPABASE ─────────────
const SUPABASE_URL = "https://sxofvadbeznwgctdzbmk.supabase.co";
const SUPABASE_KEY = "sb_publishable_j9BUYILtg52cqg0-CnioZQ_iFi5Z0Yx";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Convert a Supabase row into the in-memory message shape used by the rest of
// the app. `mine` is always false here — the local "mine" flag is set
// separately based on what's in localStorage on this device.
function rowToMsg(row, mineIds) {
  return {
    id: row.id,
    text: row.text,
    lat: row.lat,
    lng: row.lng,
    loc: row.loc || "",
    mood: row.mood,
    mine: mineIds.has(row.id)
  };
}

// Returns an ISO timestamp for "midnight UTC of today" — used to filter the
// messages table down to just today's drops.
function todayMidnightUTC() {
  const now = new Date();
  return new Date(Date.UTC(
    now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 0, 0, 0, 0
  )).toISOString();
}


// ───────────── MOODS ─────────────
const MOODS = [
  { id: "joyful",   name: "joyful",   color: "#F5B842" },
  { id: "calm",     name: "calm",     color: "#5BBED4" },
  { id: "anxious",  name: "anxious",  color: "#E88A3D" },
  { id: "angry",    name: "angry",    color: "#D85050" },
  { id: "sad",      name: "sad",      color: "#7866D9" },
  { id: "hopeful",  name: "hopeful",  color: "#4DB58E" },
  { id: "curious",  name: "curious",  color: "#B576E0" },
  { id: "lonely",   name: "lonely",   color: "#7D8FA8" },
  { id: "grateful", name: "grateful", color: "#ED7AA0" }
];
const MOOD_BY_ID = Object.fromEntries(MOODS.map(m => [m.id, m]));

// ───────────── CITY DATABASE (for nearest-city labeling) ─────────────
const CITIES = [
  { name: "Portland, OR", lat: 45.5152, lng: -122.6784 },

// ───────────── COLOR UTILS ─────────────
function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return [
    parseInt(h.slice(0, 2), 16),
    parseInt(h.slice(2, 4), 16),
    parseInt(h.slice(4, 6), 16)
  ];
}
function rgbToHex(r, g, b) {
  const c = n => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, "0");
  return "#" + c(r) + c(g) + c(b);
}
function rgba(hex, a) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function averageColors(hexes) {
  if (!hexes.length) return null;
  let r = 0, g = 0, b = 0;
  for (const h of hexes) {
    const [hr, hg, hb] = hexToRgb(h);
    r += hr; g += hg; b += hb;
  }
  const n = hexes.length;
  return rgbToHex(r / n, g / n, b / n);
}

// ───────────── NEAREST CITY ─────────────
function nearestCity(lat, lng) {
  let best = null, bestD = Infinity;
  const w = ((lng + 540) % 360) - 180;
  const cosLat = Math.cos((lat * Math.PI) / 180);
  for (const c of CITIES) {
    const dLat = c.lat - lat;
    let dLng = c.lng - w;
    if (dLng > 180) dLng -= 360;
    if (dLng < -180) dLng += 360;
    const dx = dLng * cosLat;
    const d = dLat * dLat + dx * dx;
    if (d < bestD) { bestD = d; best = c; }
  }
  return best ? best.name : `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// Vertical lock at near-poles, horizontal effectively unbounded so wrap still works
const VERT_BOUND = 85.05;
const HORIZ_BOUND = 1e6;

const map = L.map("map", {
  worldCopyJump: true,
  maxZoom: 9,
  zoomControl: false,
  attributionControl: false,
  zoomSnap: 0.25,
  maxBounds: [[-VERT_BOUND, -HORIZ_BOUND], [VERT_BOUND, HORIZ_BOUND]],
  maxBoundsViscosity: 1.0,
  inertia: true,
  inertiaDeceleration: 1200,
  inertiaMaxSpeed: 2400,
  easeLinearity: 0.05,
  zoomAnimation: true,
  zoomAnimationThreshold: 8,
  fadeAnimation: true,
  markerZoomAnimation: true
}).setView([0, 0], 2);

// Compute the zoom at which the full latitude range fills the viewport vertically.
// Web Mercator world height (in px) at zoom z = 256 * 2^z. Pin minZoom so the world
// can never be smaller than the viewport, eliminating top/bottom whitespace.
// Mobile (narrow viewport) starts more zoomed out so users see more of the world.
const IS_MOBILE_VIEWPORT = window.innerWidth < 768;
const INITIAL_ZOOM = IS_MOBILE_VIEWPORT ? 1.5 : 2.3;

function applyVerticalFit(initial) {
  const h = map.getSize().y;
  if (!h) return;
  const fitZoom = Math.log2(h / 256);
  // Cap minZoom at INITIAL_ZOOM so the locked starting zoom is always allowed,
  // even on very tall viewports where the world-fit zoom would exceed it.
  const minZ = Math.min(INITIAL_ZOOM, Math.max(1, fitZoom));
  map.setMinZoom(minZ);
  if (initial) {
    map.setView([20, 10], INITIAL_ZOOM, { animate: false });
  } else if (map.getZoom() < minZ) {
    map.setView(map.getCenter(), minZ, { animate: false });
  }
}
applyVerticalFit(true);

// Inverted wheel zoom — swipe up always zooms in
map.scrollWheelZoom.disable();
(function setupInvertedWheel() {
  let accum = 0;
  let target = null;
  let frame = null;
  let lastEvent = null;
  map.getContainer().addEventListener("wheel", function (e) {
    e.preventDefault();
    // Trackpad pinch fires wheel with ctrlKey=true — keep that natural (pinch out = zoom in)
    const sign = e.ctrlKey ? -1 : 1;
    accum += sign * e.deltaY;
    lastEvent = e;
    if (frame) return;
    frame = requestAnimationFrame(() => {
      // Defer the forced-layout read (mouseEventToContainerPoint -> getBoundingClientRect)
      // until rAF so we do it at most once per frame, not once per wheel tick.
      target = map.mouseEventToContainerPoint(lastEvent);
      const change = accum / 100;
      const next = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), map.getZoom() + change));
      map.setZoomAround(target, next, { animate: true, duration: 0.3, easeLinearity: 0.05 });
      accum = 0;
      frame = null;
    });
  }, { passive: false });
})();

function dotIconHtml(mood, mine) {
  const color = MOOD_BY_ID[mood]?.color || "#1a1a1a";
  const soft = rgba(color, 0.45);
  return `<div class="dot${mine ? " mine" : ""}" style="--c:${color}; --c-soft:${soft};"></div>`;
}

// Hover-preview tooltips only bind on real pointer devices. Touch screens fall
// through and keep the unchanged tap-to-popup behavior.
const IS_HOVER_DEVICE = matchMedia("(hover: hover) and (pointer: fine)").matches;

function firstLine(text) {
  if (!text) return "";
  const line = text.split(/\r?\n/)[0].trim();
  return line.length > 80 ? line.slice(0, 80).trim() + "…" : line;
}

function addDotMarker(msg) {
  const icon = L.divIcon({
    className: "dot-wrap",
    html: dotIconHtml(msg.mood, msg.mine),
    iconSize: [11, 11],
    iconAnchor: [5.5, 5.5]
  });
  const m = L.marker([msg.lat, msg.lng], { icon, riseOnHover: true, keyboard: false });
  m.bindPopup(() => buildPopup(msg), {
    closeButton: false,
    minWidth: 220,
    maxWidth: 220,
    autoPan: false
  });

  if (IS_HOVER_DEVICE && msg.text) {
    m.bindTooltip(escapeHtml(firstLine(msg.text)), {
      direction: "top",
      offset: [0, -6],
      opacity: 1,
      className: "dot-tooltip"
    });
  }

  m.on("popupopen", () => {
    const el = m.getElement();
    if (el) { const d = el.querySelector(".dot"); if (d) d.classList.add("expanded"); }
    // Defer the scrollHeight read (forces layout) and clampable wiring out of the
    // click frame so tap → popup feels instant, then we set up clamping next tick.
    requestAnimationFrame(() => {
      const popupEl = m.getPopup() && m.getPopup().getElement();
      const textEl = popupEl && popupEl.querySelector(".msg-text");
      if (!textEl || textEl.dataset.bound) return;
      textEl.dataset.bound = "1";
      if (textEl.scrollHeight > textEl.clientHeight + 1) {
        textEl.classList.add("clampable");
      }
      textEl.addEventListener("click", () => {
        if (!textEl.classList.contains("clampable") && !textEl.classList.contains("expanded")) return;
        textEl.classList.toggle("expanded");
        const p = m.getPopup();
        if (p && p.update) p.update();
      });
    });
  });
  m.on("popupclose", () => {
    const el = m.getElement();
    if (el) { const d = el.querySelector(".dot"); if (d) d.classList.remove("expanded"); }
  });

  dotLayer.addLayer(m);
  dotMarkers.set(msg.id, m);
}

function buildPopup(msg) {
  const wrap = document.createElement("div");
  const mood = MOOD_BY_ID[msg.mood];
  const target = getCurrentLang();

  // If a translation for this message+lang is already resolved, paint it on
  // first render — no async replacement, no layout thrash on re-open.
  let displayText = msg.text;
  if (target && target !== "off" && msg.text) {
    const cached = getTranslatedNow(msg.text, target);
    if (cached && normalizeForCompare(cached) !== normalizeForCompare(msg.text)) {
      displayText = cached;
    }
  }

  wrap.innerHTML =
    `<div class="msg-text">${escapeHtml(displayText)}</div>` +
    `<div class="msg-meta">` +
      `<span class="msg-mood" style="--c:${mood?.color || "#999"}">${escapeHtml(mood?.name || msg.mood)}</span>` +
      `<span class="msg-divider">·</span>` +
      `<span class="msg-loc">${escapeHtml(msg.loc || "")}</span>` +
    `</div>`;

  // First-time path: kick off the fetch and replace the text when it resolves.
  // If displayText is already the translation, we don't need to do anything.
  if (target && target !== "off" && msg.text && displayText === msg.text) {
    const textEl = wrap.querySelector(".msg-text");
    translate(msg.text, target).then((t) => {
      if (!t) return;
      if (!textEl.isConnected || getCurrentLang() !== target) return;
      if (normalizeForCompare(t) === normalizeForCompare(msg.text)) return;
      if (textEl.textContent === t) return;
      textEl.textContent = t;
      requestAnimationFrame(() => {
        textEl.classList.remove("clampable", "expanded");
        if (textEl.scrollHeight > textEl.clientHeight + 1) {
          textEl.classList.add("clampable");
        }
      });
      const m = dotMarkers.get(msg.id);
      const p = m && m.getPopup && m.getPopup();
      if (p && p.update) p.update();
    });
  }

  return wrap;
}

function rebuildDots() {
  dotLayer.clearLayers();
  dotMarkers.clear();
  for (const m of messages) addDotMarker(m);
}

function clearPreview() {
  if (previewMarker) {
    previewMarker.remove();
    previewMarker = null;
  }

function openCompose(latlng) {
  if (hasDroppedToday()) {
    flashHint("you've already left your mark today");
    return;
  }
  pendingLatLng = latlng;
  clearPreview();
  previewMarker = L.marker(latlng, {

    }),

  composeText.value = "";

  [...moodPickerEl.children].forEach(c => c.classList.remove("selected"));
  clearComposeError();
  updateCounter();
  updateSendEnabled();
  compose.classList.add("open");
  setTimeout(() => composeText.focus(), 60);
}

function closeCompose(submitted) {
  compose.classList.remove("open");
  if (!submitted) clearPreview();
  pendingLatLng = null;
}

function updateCounter() {
  const len = composeText.value.length;
  counter.textContent = String(280 - len);
  counter.classList.toggle("over", len > 280);
  if (composeError && !composeError.hidden) clearComposeError();
  updateSendEnabled();
}
function updateSendEnabled() {
  const len = composeText.value.length;
  sendBtn.disabled = !(len > 0 && len <= 280 && selectedMood);
}

const URL_RE = /(?:https?:\/\/|www\.)\S+|\b[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.(?:com|org|net|io|app|co|gov|edu|me|us|uk|ca|de|fr|jp|cn|au|ru|br|in|info|biz|tv|to|ly|gl|sh|xyz|dev|ai)\b/i;
const composeError = document.getElementById("composeError");

function showComposeError(text) {
  composeError.textContent = text;
  composeError.hidden = false;
}
function clearComposeError() {
  composeError.textContent = "";
  composeError.hidden = true;
}

async function submit() {
  const text = composeText.value.trim();
  if (!text || text.length > 280 || !pendingLatLng || !selectedMood) return;
  if (URL_RE.test(text)) {
    showComposeError("links aren't allowed here. plain text and feelings only.");
    return;
  }
  if (hasDroppedToday()) { closeCompose(false); return; }

  const ll = pendingLatLng;
  const loc = nearestCity(ll.lat, ll.lng);

  // Lock the send button while the network call is in flight so a double-tap
  // can't create two rows.
  sendBtn.disabled = true;

  // Write to Supabase. We let the database generate the UUID and return it so
  // the in-memory id matches the database id (important for realtime: the
  // INSERT event echoes back to this client and we need to recognize our own
  // row to skip it).
  const { data, error } = await sb
    .from("messages")
    .insert({ text, lat: ll.lat, lng: ll.lng, loc, mood: selectedMood })
    .select()
    .single();

  if (error || !data) {
    sendBtn.disabled = false;
    showComposeError("couldn't send. check your connection and try again.");
    return;
  }

  const msg = {
    id: data.id,
    text: data.text,
    lat: data.lat,
    lng: data.lng,
    loc: data.loc || loc,
    mood: data.mood,
    mine: true
  };

  // Persist user-only messages (localStorage stays as the client-side
  // "you've already dropped today" guard)
  const userMsgs = loadUserMessages();
  userMsgs.push({
    id: msg.id, text: msg.text, lat: msg.lat, lng: msg.lng,
    loc: msg.loc, mood: msg.mood, mine: true
  });
  saveUserMessages(userMsgs);

  messages.push(msg);

  clearPreview();
  addDotMarker(msg);
  updateLayers();

  closeCompose(true);
  const m = dotMarkers.get(msg.id);
  if (m && map.hasLayer(dotLayer)) m.openPopup();
  hideHint();
}

  { code: "hi",    label: "हिन्दी" },
  { code: "zh",    label: "中文 (简体)" },

];
const LANG_KEY = "hw-language";
const langBtn = document.getElementById("langBtn");
const langPanel = document.getElementById("langPanel");

function getCurrentLang() {
  return localStorage.getItem(LANG_KEY) || "off";
}

function setLang(code) {
  const previous = localStorage.getItem(LANG_KEY);
  localStorage.setItem(LANG_KEY, code);
  for (const opt of langPanel.children) {
    opt.classList.toggle("active", opt.dataset.code === code);
  }
  // If the same language is picked again, nothing to re-render.
  if (previous === code) return;

  // Re-translate the currently open popup (if any) on the spot, so the user
  // sees the change immediately instead of having to close and re-open.
  const openMarker = [...dotMarkers.values()].find(m => m.isPopupOpen && m.isPopupOpen());
  if (!openMarker) return;
  const msg = messages.find(m => dotMarkers.get(m.id) === openMarker);
  if (!msg) return;

  const popup = openMarker.getPopup();
  const popupEl = popup && popup.getElement();
  const textEl = popupEl && popupEl.querySelector(".msg-text");
  if (!textEl) return;

  if (code === "off" || !msg.text) {
    // Switching translation OFF: snap back to original text.
    textEl.textContent = msg.text || "";
    requestAnimationFrame(() => {
      textEl.classList.remove("clampable", "expanded");
      if (textEl.scrollHeight > textEl.clientHeight + 1) {
        textEl.classList.add("clampable");
      }
    });
    if (popup.update) popup.update();
    return;
  }

  // Switching to a real language: paint cached translation if we have one,
  // otherwise fetch and replace when it resolves.
  const cached = getTranslatedNow(msg.text, code);
  const applyText = (t) => {
    if (!t) return;
    if (!textEl.isConnected || getCurrentLang() !== code) return;
    if (normalizeForCompare(t) === normalizeForCompare(msg.text)) {
      textEl.textContent = msg.text;
    } else {
      textEl.textContent = t;
    }
    requestAnimationFrame(() => {
      textEl.classList.remove("clampable", "expanded");
      if (textEl.scrollHeight > textEl.clientHeight + 1) {
        textEl.classList.add("clampable");
      }
    });
    if (popup.update) popup.update();
  };

  if (cached) {
    applyText(cached);
  } else {
    translate(msg.text, code).then(applyText);
  }
}

(function buildLangPanel() {
  for (const l of LANGS) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "lang-opt";
    btn.dataset.code = l.code;
    btn.textContent = l.label;
    btn.addEventListener("click", () => {
      setLang(l.code);
      closeLangPanel();
    });
    langPanel.appendChild(btn);
  }
  // Don't auto-persist a detected default — the first-time onboarding card
  // (below) collects an explicit choice from the user. If localStorage has a
  // value (returning visitor), reflect it visually in the panel.
  const initial = localStorage.getItem(LANG_KEY);
  if (initial) {
    for (const opt of langPanel.children) {
      opt.classList.toggle("active", opt.dataset.code === initial);
    }
  }
})();

// First-time language onboarding — only shows if the user has never picked one.
(function maybeShowLangOnboarding() {
  if (localStorage.getItem(LANG_KEY)) return;
  const onboard = document.getElementById("langOnboard");
  const grid = onboard.querySelector(".lang-onboard-grid");
  // Show "no translation" first, then the 16 language options.
  const items = [
    { code: "off", label: "no translation" },
    ...LANGS.filter(l => l.code !== "off")
  ];
  for (const l of items) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "lang-pill";
    btn.dataset.code = l.code;
    btn.textContent = l.label;
    btn.addEventListener("click", () => {
      setLang(l.code);
      onboard.classList.remove("show");
      // Remove from DOM after the fade-out completes.
      setTimeout(() => onboard.remove(), 600);
    });
    grid.appendChild(btn);
  }
  setTimeout(() => onboard.classList.add("show"), 1000);
})();

function openLangPanel() {
  langPanel.classList.add("open");
  langBtn.setAttribute("aria-expanded", "true");
}
function closeLangPanel() {
  langPanel.classList.remove("open");
  langBtn.setAttribute("aria-expanded", "false");
}

langBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  if (langPanel.classList.contains("open")) closeLangPanel();
  else openLangPanel();
});
document.addEventListener("click", (e) => {
  if (!langPanel.classList.contains("open")) return;
  if (langPanel.contains(e.target) || langBtn.contains(e.target)) return;
  closeLangPanel();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && langPanel.classList.contains("open")) closeLangPanel();
});

// translationCache stores in-flight/resolved Promises so concurrent calls for
// the same text+lang share one fetch. translatedSync stores the resolved string
// synchronously so popup re-opens for already-translated messages can paint the
// translated text immediately, skipping the replace-and-relayout work that
// causes a stutter on re-open.
const translationCache = new Map();
const translatedSync = new Map();
function getTranslatedNow(text, targetLang) {
  return translatedSync.get(`${targetLang}::${text}`) || null;
}
function translate(text, targetLang) {
  const key = `${targetLang}::${text}`;
  if (translationCache.has(key)) return translationCache.get(key);
  const p = (async () => {
    try {
      const url = "https://lingva.ml/api/v1/auto/"
        + encodeURIComponent(targetLang) + "/"
        + encodeURIComponent(text);
      const r = await fetch(url);
      if (!r.ok) throw new Error("translate fetch failed");
      const data = await r.json();
      const t = data && data.translation;
      const result = (typeof t === "string" && t.trim()) ? t : null;
      if (result) translatedSync.set(key, result);
      return result;
    } catch (e) {
      translationCache.delete(key);
      return null;
    }
  })();
  translationCache.set(key, p);
  return p;
}

function normalizeForCompare(s) {
  return (s || "").toLowerCase().replace(/\s+/g, " ").trim();
}

// ───────────── DROP BUTTON + GEOLOCATION ─────────────
const dropBtn = document.getElementById("dropBtn");
const geoMsg = document.getElementById("geoMsg");
const geoDismiss = document.getElementById("geoDismiss");

function showGeoDenied() {
  geoMsg.classList.add("open");
}
geoDismiss.addEventListener("click", () => geoMsg.classList.remove("open"));
geoMsg.addEventListener("click", (e) => {
  if (e.target === geoMsg) geoMsg.classList.remove("open");
});

function requestDrop() {
  if (hasDroppedToday()) {
    flashHint("you've already left your mark today");
    return;
  }
  if (!navigator.geolocation) {
    showGeoDenied();
    return;
  }
  dropBtn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      dropBtn.disabled = false;
      const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
      const targetZoom = Math.max(map.getZoom(), 6);
      map.setView(ll, targetZoom, { animate: true });
      openCompose(ll);
      hideHint();
    },
    () => {
      dropBtn.disabled = false;
      showGeoDenied();
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
}
dropBtn.addEventListener("click", requestDrop);

composeText.addEventListener("input", updateCounter);
sendBtn.addEventListener("click", submit);
cancelBtn.addEventListener("click", () => closeCompose(false));

compose.addEventListener("click", (e) => {
  if (e.target === compose) closeCompose(false);
});

document.addEventListener("keydown", (e) => {
  if (!compose.classList.contains("open")) return;
  if (e.key === "Escape") closeCompose(false);
  else if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submit();
});

// ───────────── HINT ─────────────
let hintTimer = null;
function flashHint(text) {
  hint.textContent = text;
  hint.classList.remove("gone");
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hint.classList.add("gone"), 4000);
}
function hideHint() {
  if (hint && !hint.classList.contains("gone")) hint.classList.add("gone");
}
if (hasDroppedToday()) {
  hint.textContent = "you've left your mark today";
  hint.classList.remove("gone");
  setTimeout(() => hint.classList.add("gone"), 6000);
}

// ───────────── MIDNIGHT RESET ─────────────
(function scheduleMidnight() {
  const now = new Date();
  const next = new Date(now);
  next.setHours(24, 0, 0, 0);
  const wait = next - now + 500;
  setTimeout(() => location.reload(), wait);
})();

// ───────────── RESET COUNTDOWN ─────────────
(function startResetTimer() {
  const el = document.getElementById("resetTimer");
  if (!el) return;
  function update() {
    const now = new Date();
    const next = new Date(Date.UTC(
      now.getUTCFullYear(),
      now.getUTCMonth(),
      now.getUTCDate() + 1,
      0, 0, 0, 0
    ));
    const diff = Math.max(0, next - now);
    const hours = Math.floor(diff / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    let text;
    if (hours > 0 && minutes > 0) text = `resets in ${hours}h ${minutes}m`;
    else if (hours > 0) text = `resets in ${hours}h`;
    else if (minutes > 0) text = `resets in ${minutes}m`;
    else text = "resetting soon";
    el.textContent = text;
  }
  update();
  setInterval(update, 60000);
})();

// ───────────── DEV RESET (console only) ─────────────
window.resetMyDot = function () {
  localStorage.removeItem(USER_KEY);
  for (const m of messages) {
    if (!m.mine) continue;
    const marker = dotMarkers.get(m.id);
    if (marker) {
      dotLayer.removeLayer(marker);
      dotMarkers.delete(m.id);
    }
  }
  messages = messages.filter(m => !m.mine);
  clearPreview();
  hint.classList.add("gone");
  dropBtn.disabled = false;
  console.log("%c[dev] resetMyDot: localStorage cleared, ready for a new drop", "color:#888");
  return "ok";
};

// ───────────── BOOT ─────────────
(async function boot() {
  buildMessages();
  rebuildDots();
  if (!map.hasLayer(dotLayer)) dotLayer.addTo(map);

  // Country layer is heavy (~177 SVG paths). Load and render it AFTER first
  // paint so dots and UI come up immediately. Use requestIdleCallback to slot
  // the SVG build into a quiet frame, with a setTimeout fallback.
  loadCountries().then(() => {
    const run = () => buildCountriesLayer();
    if (typeof requestIdleCallback === "function") {
      requestIdleCallback(run, { timeout: 1500 });
    } else {
      setTimeout(run, 100);
    }
  });

  // ── Fetch today's real dots from Supabase ──
  // Build a set of IDs we know are "ours" (already in localStorage) so we can
  // flag them correctly when they come back from the database.
  const mineIds = new Set(loadUserMessages().map(m => m.id));

  try {
    const { data, error } = await sb
      .from("messages")
      .select("id, text, lat, lng, loc, mood, created_at")
      .gte("created_at", todayMidnightUTC())
      .order("created_at", { ascending: true });

    if (!error && Array.isArray(data)) {
      // Skip any rows already in the in-memory messages array (covers the case
      // where boot races with realtime, or the user just dropped a dot).
      const existingIds = new Set(messages.map(m => m.id));
      for (const row of data) {
        if (existingIds.has(row.id)) continue;
        const msg = rowToMsg(row, mineIds);
        messages.push(msg);
        addDotMarker(msg);
      }
      updateLayers();
    } else if (error) {
      console.warn("[supabase] initial fetch failed:", error.message);
    }
  } catch (e) {
    console.warn("[supabase] initial fetch threw:", e);
  }

  // ── Realtime: subscribe to new inserts ──
  // Anyone in the world drops a dot, this fires on every connected client.
  sb.channel("messages-realtime")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      (payload) => {
        const row = payload.new;
        if (!row || !row.id) return;
        // Skip if we already have this dot — covers the case where this client
        // is the one that inserted it (we already added it to the map in submit()).
        if (dotMarkers.has(row.id)) return;
        const msg = rowToMsg(row, mineIds);
        messages.push(msg);
        addDotMarker(msg);
        updateLayers();
      }
    )
    .subscribe();
})();
</script>
